<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tap Beats</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital@1&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }

        :root {
            --bg-color: #ffffff;
            --card-bg: rgba(255, 255, 255, 0.95);
            --grid-color: rgba(0, 0, 0, 0.08);
            --pad-bg: rgba(0, 0, 0, 0.05);
            --pad-border: rgba(0, 0, 0, 0.1);
            --pad-active: #667eea;
            --text-color: #333333;
            --text-secondary: #666666;
            --button-bg: rgba(102, 126, 234, 0.9);
            --button-text: #ffffff;
            --dock-bg: rgba(255, 255, 255, 0.95);
            --border-color: rgba(0, 0, 0, 0.1);
            --recording: #ef4444;
            --success: #4CAF50;
            --shadow: 0 4px 12px rgba(0, 0, 0, 0.08);
            --shadow-heavy: 0 10px 40px rgba(0, 0, 0, 0.1);
        }

        [data-theme="dark"] {
            --bg-color: #1a1a1a;
            --card-bg: rgba(45, 45, 45, 0.95);
            --grid-color: rgba(255, 255, 255, 0.03);
            --pad-bg: rgba(255, 255, 255, 0.05);
            --pad-border: rgba(255, 255, 255, 0.1);
            --pad-active: #8b9cff;
            --text-color: #ffffff;
            --text-secondary: #aaaaaa;
            --button-bg: rgba(139, 156, 255, 0.9);
            --button-text: #1a1a1a;
            --dock-bg: rgba(45, 45, 45, 0.95);
            --border-color: rgba(255, 255, 255, 0.1);
            --recording: #ff6b6b;
            --success: #66bb6a;
            --shadow: 0 4px 12px rgba(0, 0, 0, 0.3);
            --shadow-heavy: 0 10px 40px rgba(0, 0, 0, 0.4);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: var(--bg-color);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            color: var(--text-color);
            position: relative;
            overflow-x: hidden;
            transition: background 0.3s ease;
        }

        /* Grid Background - Full Page */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-image: 
                linear-gradient(var(--grid-color) 1px, transparent 1px),
                linear-gradient(90deg, var(--grid-color) 1px, transparent 1px);
            background-size: 30px 30px;
            pointer-events: none;
            z-index: 1;
        }

        /* Header - No Background */
        .header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px;
            z-index: 100;
        }

        .app-title {
            font-family: 'EB Garamond', serif;
            font-style: italic;
            font-size: 1.8em;
            font-weight: 400;
            opacity: 0.9;
        }

        .header-controls {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .start-audio-btn {
            background: var(--button-bg);
            color: var(--button-text);
            border: none;
            padding: 8px 20px;
            border-radius: 20px;
            font-size: 0.9em;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: var(--shadow);
        }

        .start-audio-btn:hover {
            transform: scale(1.05);
        }

        .start-audio-btn:active {
            transform: scale(0.95);
        }

        .start-audio-btn.hidden {
            display: none;
        }

        .theme-toggle {
            background: none;
            border: none;
            font-size: 1.5em;
            cursor: pointer;
            transition: transform 0.3s ease, opacity 0.3s ease;
            opacity: 0.7;
            padding: 5px;
        }

        .theme-toggle:hover {
            transform: scale(1.1);
            opacity: 1;
        }

        .theme-toggle:active {
            transform: scale(0.95);
        }

        /* Main Container */
        .container {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 100px 20px 120px;
            position: relative;
            z-index: 10;
        }

        /* Beat Pad Card */
        .beat-pad-card {
            background: var(--card-bg);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border-radius: 24px;
            border: 1px solid var(--border-color);
            padding: 30px;
            box-shadow: var(--shadow-heavy);
            width: 100%;
            max-width: 400px;
        }

        /* Pad Grid */
        .pad-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            aspect-ratio: 1;
        }

        .pad {
            background: var(--pad-bg);
            border: 2px solid var(--pad-border);
            border-radius: 16px;
            cursor: pointer;
            transition: all 0.15s ease;
            /* Hint to browser to optimise for transform/background changes for smoother animation */
            will-change: transform, background;
            position: relative;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            font-weight: 600;
            color: var(--text-secondary);
        }

        .pad::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            border-radius: 50%;
            background: var(--pad-active);
            transform: translate(-50%, -50%);
            transition: all 0.4s ease;
            opacity: 0.3;
        }

        .pad.active::before {
            width: 150%;
            height: 150%;
            opacity: 0;
        }

        .pad.active {
            background: var(--pad-active);
            border-color: var(--pad-active);
            transform: scale(0.92);
            color: var(--button-text);
        }

        .pad.recording-active {
            animation: recordPulse 0.3s ease;
        }

        @keyframes recordPulse {
            0% { transform: scale(1); }
            50% { transform: scale(0.88); }
            100% { transform: scale(1); }
        }

        /* Bottom Dock */
        .dock-container {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            display: flex;
            justify-content: center;
            padding: 20px;
            z-index: 100;
        }

        .dock {
            background: var(--dock-bg);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            padding: 12px 20px;
            display: flex;
            align-items: center;
            gap: 15px;
            box-shadow: var(--shadow-heavy);
        }

        .dock-title {
            font-size: 0.85em;
            color: var(--text-secondary);
            margin-right: 10px;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .dock-divider {
            width: 1px;
            height: 30px;
            background: var(--border-color);
        }

        .dock-btn {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: transparent;
            border: 2px solid var(--border-color);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s ease;
            /* Optimise button animations */
            will-change: transform, background;
            font-size: 18px;
            color: var(--text-color);
            position: relative;
        }

        .dock-btn:hover {
            transform: scale(1.1);
            background: var(--pad-bg);
        }

        .dock-btn:active {
            transform: scale(0.95);
        }

        .dock-btn.primary {
            background: var(--button-bg);
            border-color: var(--button-bg);
            color: var(--button-text);
        }

        .dock-btn.recording {
            background: var(--recording);
            border-color: var(--recording);
            color: white;
            animation: recordingPulse 1.5s infinite;
        }

        @keyframes recordingPulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.8; transform: scale(1.05); }
        }

        .dock-btn.playing {
            background: var(--success);
            border-color: var(--success);
            color: white;
        }

        /* Settings Sheet */
        .settings-sheet {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: var(--dock-bg);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border-top: 1px solid var(--border-color);
            border-radius: 24px 24px 0 0;
            padding: 24px;
            transform: translateY(100%);
            transition: transform 0.3s ease;
            z-index: 200;
            max-height: 70vh;
            overflow-y: auto;
            box-shadow: var(--shadow-heavy);
        }

        .settings-sheet.open {
            transform: translateY(0);
        }

        .settings-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
        }

        .settings-header h2 {
            font-size: 1.2em;
            font-weight: 600;
        }

        .close-settings {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: var(--pad-bg);
            border: 1px solid var(--border-color);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            color: var(--text-color);
            transition: all 0.2s ease;
        }

        .close-settings:hover {
            background: var(--pad-active);
            color: var(--button-text);
        }

        .setting-group {
            margin-bottom: 24px;
        }

        .setting-label {
            font-size: 0.9em;
            color: var(--text-secondary);
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
        }

        .setting-value {
            color: var(--text-color);
            font-weight: 600;
        }

        input[type="range"] {
            width: 100%;
            height: 6px;
            background: var(--pad-bg);
            border-radius: 3px;
            outline: none;
            -webkit-appearance: none;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: var(--button-bg);
            cursor: pointer;
            box-shadow: var(--shadow);
        }

        input[type="range"]::-moz-range-thumb {
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: var(--button-bg);
            cursor: pointer;
            border: none;
            box-shadow: var(--shadow);
        }

        .waveform-selector {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            margin-top: 10px;
        }

        .waveform-btn {
            padding: 12px;
            background: var(--pad-bg);
            border: 2px solid var(--pad-border);
            border-radius: 12px;
            color: var(--text-secondary);
            cursor: pointer;
            transition: all 0.2s ease;
            font-size: 0.9em;
            font-weight: 500;
        }

        .waveform-btn.active {
            background: var(--button-bg);
            border-color: var(--button-bg);
            color: var(--button-text);
        }

        /* Toast Notifications */
        .toast {
            position: fixed;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: var(--dock-bg);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid var(--border-color);
            padding: 12px 24px;
            border-radius: 24px;
            opacity: 0;
            transition: all 0.3s ease;
            z-index: 300;
            white-space: nowrap;
            font-size: 0.9em;
            box-shadow: var(--shadow-heavy);
        }

        .toast.show {
            transform: translateX(-50%) translateY(0);
            opacity: 1;
        }

        /* Overlay */
        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            /* Reduced opacity for overlay for performance */
            background: rgba(0, 0, 0, 0.4);
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
            z-index: 150;
        }

        .overlay.open {
            opacity: 1;
            pointer-events: all;
        }

        /* Status Display */
        .status-display {
            position: fixed;
            top: 80px;
            left: 20px;
            font-size: 0.9em;
            z-index: 100;
            pointer-events: none;
        }

        .status-label {
            font-size: 0.8em;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .status-value {
            font-size: 1.4em;
            font-weight: bold;
            margin-top: 2px;
            color: var(--text-color);
        }

        /* Responsive */
        @media (max-width: 640px) {
            .header {
                padding: 15px;
            }

            .app-title {
                font-size: 1.5em;
            }

            .theme-toggle {
                font-size: 1.3em;
            }

            .container {
                padding: 80px 15px 110px;
            }

            .beat-pad-card {
                padding: 20px;
            }

            .pad {
                font-size: 20px;
            }

            .dock-container {
                padding: 15px;
            }

            .dock {
                padding: 10px 15px;
                gap: 12px;
            }

            .dock-btn {
                width: 40px;
                height: 40px;
                font-size: 16px;
            }

            .dock-title {
                font-size: 0.75em;
                margin-right: 8px;
            }

            .status-display {
                top: 65px;
                left: 15px;
            }
        }

        @media (max-width: 480px) {
            .dock-title {
                display: none;
            }

            .dock-divider {
                display: none;
            }
        }

        /* Landscape mobile */
        @media (max-height: 500px) {
            .header {
                padding: 10px 15px;
            }

            .container {
                padding: 60px 15px 90px;
            }

            .beat-pad-card {
                padding: 15px;
            }

            .pad-grid {
                gap: 10px;
            }
        }
    </style>
</head>
<body>
    <!-- Header -->
    <div class="header">
        <div class="app-title">Tap Beats</div>
        <div class="header-controls">
            <button class="start-audio-btn" id="startAudioBtn">Start Audio</button>
            <button class="theme-toggle" id="themeToggle">☀️</button>
        </div>
    </div>

    <!-- Status Display -->
    <div class="status-display" id="statusDisplay" style="display: none;">
        <div class="status-label">BPM</div>
        <div class="status-value" id="statusValue">120</div>
    </div>

    <!-- Main Container -->
    <div class="container">
        <div class="beat-pad-card">
            <div class="pad-grid" id="padGrid">
                <!-- Pads will be generated by JavaScript -->
            </div>
        </div>
    </div>

    <!-- Bottom Dock -->
    <div class="dock-container">
        <div class="dock">
            <span class="dock-title">Controls</span>
            <div class="dock-divider"></div>
            <button class="dock-btn" id="clearBtn" title="Clear">
                <span>↻</span>
            </button>
            <button class="dock-btn" id="playBtn" title="Play/Stop">
                <span id="playIcon">▶</span>
            </button>
            <button class="dock-btn primary" id="recordBtn" title="Record">
                <span>●</span>
            </button>
            <button class="dock-btn" id="settingsBtn" title="Settings">
                <span>⚙</span>
            </button>
        </div>
    </div>

    <!-- Settings Sheet -->
    <div class="overlay" id="overlay"></div>
    <div class="settings-sheet" id="settingsSheet">
        <div class="settings-header">
            <h2>Settings</h2>
            <button class="close-settings" id="closeSettings">✕</button>
        </div>
        
        <div class="setting-group">
            <div class="setting-label">
                <span>BPM</span>
                <span class="setting-value" id="bpmValue">120</span>
            </div>
            <input type="range" id="bpmSlider" min="60" max="200" value="120">
        </div>

        <div class="setting-group">
            <div class="setting-label">
                <span>Waveform</span>
            </div>
            <div class="waveform-selector">
                <button class="waveform-btn active" data-wave="sine">Sine</button>
                <button class="waveform-btn" data-wave="square">Square</button>
                <button class="waveform-btn" data-wave="sawtooth">Sawtooth</button>
                <button class="waveform-btn" data-wave="triangle">Triangle</button>
            </div>
        </div>

        <div class="setting-group">
            <div class="setting-label">
                <span>Decay</span>
                <span class="setting-value" id="decayValue">300ms</span>
            </div>
            <input type="range" id="decaySlider" min="50" max="1000" value="300">
        </div>

        <div class="setting-group">
            <div class="setting-label">
                <span>Volume</span>
                <span class="setting-value" id="volumeValue">70%</span>
            </div>
            <input type="range" id="volumeSlider" min="0" max="100" value="70">
        </div>
    </div>

    <!-- Toast Container -->
    <div class="toast" id="toast"></div>

    <script>
        // Audio Context and Global State
        let audioContext = null;
        let isAudioUnlocked = false;
        let masterGain = null;

        // App State
        let isRecording = false;
        let isPlaying = false;
        let recordedBeats = [];
        // schedule-based playback uses a single timeout rather than a fast interval.
        let playbackTimeout = null;
        let startRecordTime = null;
        let currentTheme = localStorage.getItem('tapBeatsTheme') || 'dark';

        // Settings
        let settings = {
            bpm: 120,
            waveform: 'sine',
            decay: 300,
            volume: 0.7
        };

        // Pad frequencies (pentatonic scale for pleasant sound)
        const padFrequencies = [
            261.63, 293.66, 329.63,  // C4, D4, E4
            392.00, 440.00, 493.88,  // G4, A4, B4
            523.25, 587.33, 659.25   // C5, D5, E5
        ];

        // Initialize on page load
        document.addEventListener('DOMContentLoaded', () => {
            initializeTheme();
            initializePads();
            setupEventListeners();
            checkFirstVisit();
        });

        // Initialize Theme
        function initializeTheme() {
            document.documentElement.setAttribute('data-theme', currentTheme);
            document.getElementById('themeToggle').textContent = currentTheme === 'dark' ? '☀️' : '🌙';
        }

        // Initialize Audio Context
        function initAudio() {
            if (audioContext) return;
            
            audioContext = new (window.AudioContext || window.webkitAudioContext)();
            masterGain = audioContext.createGain();
            masterGain.gain.value = settings.volume;
            masterGain.connect(audioContext.destination);
            
            isAudioUnlocked = true;
            document.getElementById('startAudioBtn').classList.add('hidden');
            document.getElementById('statusDisplay').style.display = 'block';
            showToast('🎵 Audio ready! Start tapping!');
        }

        // Initialize Pads
        function initializePads() {
            const padGrid = document.getElementById('padGrid');
            
            for (let i = 0; i < 9; i++) {
                const pad = document.createElement('div');
                pad.className = 'pad';
                pad.dataset.index = i;
                pad.dataset.frequency = padFrequencies[i];
                pad.textContent = (i + 1).toString();
                
                // Touch events for mobile
                pad.addEventListener('touchstart', (e) => {
                    e.preventDefault();
                    handlePadPress(pad);
                });
                
                // Mouse events for desktop
                pad.addEventListener('mousedown', () => handlePadPress(pad));
                
                padGrid.appendChild(pad);
            }
        }

        // Handle Pad Press
        function handlePadPress(pad) {
            if (!isAudioUnlocked) {
                showToast('⚡ Please tap "Start Audio" first');
                return;
            }
            
            const frequency = parseFloat(pad.dataset.frequency);
            const index = parseInt(pad.dataset.index);
            
            // Visual feedback
            pad.classList.add('active');
            if (isRecording) {
                pad.classList.add('recording-active');
            }
            
            setTimeout(() => {
                pad.classList.remove('active', 'recording-active');
            }, 150);
            
            // Play sound
            playTone(frequency);
            
            // Record if recording
            if (isRecording && startRecordTime) {
                const timestamp = Date.now() - startRecordTime;
                recordedBeats.push({
                    padIndex: index,
                    timestamp: timestamp,
                    frequency: frequency
                });
            }
        }

        // Play Tone
        function playTone(frequency) {
            const oscillator = audioContext.createOscillator();
            const gainNode = audioContext.createGain();

            oscillator.type = settings.waveform;
            oscillator.frequency.value = frequency;

            gainNode.gain.setValueAtTime(0.3, audioContext.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + (settings.decay / 1000));

            oscillator.connect(gainNode);
            gainNode.connect(masterGain);

            oscillator.start();
            oscillator.stop(audioContext.currentTime + (settings.decay / 1000));
        }

        // Schedule a tone to play at a specific delay (ms) relative to now.
        function scheduleTone(freq, delayMs) {
            const osc = audioContext.createOscillator();
            const gain = audioContext.createGain();
            osc.type = settings.waveform;
            osc.frequency.value = freq;
            const startTime = audioContext.currentTime + (delayMs / 1000);
            gain.gain.setValueAtTime(0.3, startTime);
            gain.gain.exponentialRampToValueAtTime(0.01, startTime + (settings.decay / 1000));
            osc.connect(gain);
            gain.connect(masterGain);
            osc.start(startTime);
            osc.stop(startTime + (settings.decay / 1000));
        }

        // Trigger the pad visual state for the given index.  This function
        // isolates the DOM manipulation and ensures the active class is removed.
        function flashPad(index) {
            const pad = document.querySelector(`[data-index="${index}"]`);
            if (!pad) return;
            pad.classList.add('active');
            setTimeout(() => {
                pad.classList.remove('active');
            }, 150);
        }

        // Recording Functions
        function startRecording() {
            if (!isAudioUnlocked) {
                showToast('⚡ Please start audio first');
                return;
            }
            
            isRecording = true;
            recordedBeats = [];
            startRecordTime = Date.now();
            
            document.getElementById('recordBtn').classList.add('recording');
            showToast('🔴 Recording...');
        }

        function stopRecording() {
            isRecording = false;
            startRecordTime = null;
            
            document.getElementById('recordBtn').classList.remove('recording');
            
            if (recordedBeats.length > 0) {
                showToast(`✓ Recorded ${recordedBeats.length} beats`);
            } else {
                showToast('⚠️ No beats recorded');
            }
        }

        // Playback Functions
        function startPlayback() {
            if (recordedBeats.length === 0) {
                showToast('⚠️ Nothing to play');
                return;
            }

            if (!isAudioUnlocked) {
                showToast('⚡ Please start audio first');
                return;
            }

            isPlaying = true;
            document.getElementById('playIcon').textContent = '■';
            document.getElementById('playBtn').classList.add('playing');

            const loopDuration = getLoopDuration();
            // recursive scheduler to loop playback precisely using timeouts
            const scheduleLoop = () => {
                recordedBeats.forEach((beat) => {
                    // schedule audio using audioContext time to avoid drift
                    scheduleTone(beat.frequency, beat.timestamp);
                    // schedule visual flash
                    setTimeout(() => flashPad(beat.padIndex), beat.timestamp);
                });
                // schedule next loop after loopDuration
                playbackTimeout = setTimeout(scheduleLoop, loopDuration);
            };

            showToast('▶️ Playing loop...');
            scheduleLoop();
        }

        function stopPlayback() {
            isPlaying = false;
            document.getElementById('playIcon').textContent = '▶';
            document.getElementById('playBtn').classList.remove('playing');

            if (playbackTimeout) {
                clearTimeout(playbackTimeout);
                playbackTimeout = null;
            }

            showToast('⏹️ Stopped');
        }

        function getLoopDuration() {
            if (recordedBeats.length === 0) return 0;
            
            const lastBeat = Math.max(...recordedBeats.map(b => b.timestamp));
            const barDuration = (60 / settings.bpm) * 4 * 1000; // 4 beats per bar
            
            // Round up to nearest bar
            return Math.ceil(lastBeat / barDuration) * barDuration;
        }

        // Clear Recording
        function clearRecording() {
            recordedBeats = [];
            if (isPlaying) {
                stopPlayback();
            }
            if (isRecording) {
                stopRecording();
            }
            showToast('🗑️ Cleared');
        }

        // Settings Functions
        function openSettings() {
            document.getElementById('settingsSheet').classList.add('open');
            document.getElementById('overlay').classList.add('open');
        }

        function closeSettings() {
            document.getElementById('settingsSheet').classList.remove('open');
            document.getElementById('overlay').classList.remove('open');
        }

        // Toast Notification
        function showToast(message) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.classList.add('show');
            
            setTimeout(() => {
                toast.classList.remove('show');
            }, 2000);
        }

        // Check First Visit
        function checkFirstVisit() {
            if (!localStorage.getItem('tapBeatsVisited')) {
                localStorage.setItem('tapBeatsVisited', 'true');
                setTimeout(() => {
                    showToast('👋 Welcome! Tap "Start Audio" to begin');
                }, 500);
            }
        }

        // Setup Event Listeners
        function setupEventListeners() {
            // Start Audio Button
            document.getElementById('startAudioBtn').addEventListener('click', initAudio);
            
            // Theme Toggle
            document.getElementById('themeToggle').addEventListener('click', () => {
                currentTheme = currentTheme === 'light' ? 'dark' : 'light';
                document.documentElement.setAttribute('data-theme', currentTheme);
                document.getElementById('themeToggle').textContent = currentTheme === 'light' ? '🌙' : '☀️';
                localStorage.setItem('tapBeatsTheme', currentTheme);
            });
            
            // Dock Buttons
            document.getElementById('recordBtn').addEventListener('click', () => {
                if (isRecording) {
                    stopRecording();
                } else {
                    startRecording();
                }
            });
            
            document.getElementById('playBtn').addEventListener('click', () => {
                if (isPlaying) {
                    stopPlayback();
                } else {
                    startPlayback();
                }
            });
            
            document.getElementById('clearBtn').addEventListener('click', clearRecording);
            
            document.getElementById('settingsBtn').addEventListener('click', openSettings);
            
            // Settings Sheet
            document.getElementById('closeSettings').addEventListener('click', closeSettings);
            document.getElementById('overlay').addEventListener('click', closeSettings);
            
            // BPM Slider
            const bpmSlider = document.getElementById('bpmSlider');
            const bpmValue = document.getElementById('bpmValue');
            const statusValue = document.getElementById('statusValue');
            bpmSlider.addEventListener('input', (e) => {
                settings.bpm = parseInt(e.target.value);
                bpmValue.textContent = settings.bpm;
                statusValue.textContent = settings.bpm;
            });
            
            // Decay Slider
            const decaySlider = document.getElementById('decaySlider');
            const decayValue = document.getElementById('decayValue');
            decaySlider.addEventListener('input', (e) => {
                settings.decay = parseInt(e.target.value);
                decayValue.textContent = `${settings.decay}ms`;
            });
            
            // Volume Slider
            const volumeSlider = document.getElementById('volumeSlider');
            const volumeValue = document.getElementById('volumeValue');
            volumeSlider.addEventListener('input', (e) => {
                settings.volume = parseInt(e.target.value) / 100;
                volumeValue.textContent = `${e.target.value}%`;
                if (masterGain) {
                    masterGain.gain.value = settings.volume;
                }
            });
            
            // Waveform Buttons
            document.querySelectorAll('.waveform-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    document.querySelectorAll('.waveform-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    settings.waveform = btn.dataset.wave;
                });
            });
            
            // Prevent double-tap zoom on mobile
            let lastTouchEnd = 0;
            document.addEventListener('touchend', (e) => {
                const now = Date.now();
                if (now - lastTouchEnd <= 300) {
                    e.preventDefault();
                }
                lastTouchEnd = now;
            }, false);
        }
    </script>
</body>
</html>
